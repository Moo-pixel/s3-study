<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>s3-study</title>
<style>
  *{box-sizing:border-box}
  body{font-family:"Microsoft JhengHei",Arial,sans-serif;background:#141414;color:#f5f5f5;margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}
  main{width:min(420px,100%);background:#242424;border:1px solid #3d3d3d;border-radius:8px;padding:20px;text-align:center}
  h1{font-size:20px;color:#f1c40f;margin:0 0 10px}
  p{font-size:14px;color:#cfcfcf;line-height:1.7;margin:0 0 16px}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  a{display:block;text-decoration:none;color:#fff;font-weight:700;border-radius:6px;padding:12px}
  .desktop{background:#2471a3}
  .mobile{background:#239b56}
</style>
<script>
(function(){
  const version = "19";
  const params = new URLSearchParams(location.search);
  const forced = params.get("view");
  const mobileUA = /Android|iPhone|iPod|IEMobile|Mobile/i.test(navigator.userAgent);
  const narrowTouch = matchMedia("(pointer: coarse)").matches && matchMedia("(max-width: 900px)").matches;
  const target = forced === "desktop"
    ? "desktop.html"
    : forced === "mobile" || mobileUA || narrowTouch
      ? "mobile.html"
      : "desktop.html";
  location.replace(target + "?v=" + version);
})();
</script>
</head>
<body>
<main>
  <h1>乙級室內配線第三站</h1>
  <p>正在依裝置導向適合版本。若未自動跳轉，可手動選擇。</p>
  <div class="actions">
    <a class="desktop" href="desktop.html?v=19">桌機版</a>
    <a class="mobile" href="mobile.html?v=19">手機版</a>
  </div>
</main>
</body>
</html>
